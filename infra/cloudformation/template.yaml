AWSTemplateFormatVersion: '2010-09-09'
Description: Leaf backend - Cognito, single Lambda router, API Gateway (pure CloudFormation).

Parameters:
  CognitoDomainPrefix:
    Type: String
    Description: Globally unique Cognito Hosted UI domain prefix (lowercase, numbers, hyphens).
    AllowedPattern: '^[a-z][a-z0-9-]{1,61}[a-z0-9]$'
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket that holds the Lambda deployment zip (must exist in the account/region).
  LambdaCodeKey:
    Type: String
    Description: S3 key for the zip (e.g. leaf-blower/abc123.zip). Change when updating code.
  DeploymentNonce:
    Type: String
    Default: '1'
    Description: Change (e.g. git SHA) to force a new API Gateway deployment when needed.
  GoogleBooksApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: Google Books API key for book search (optional; falls back to Open Library if omitted).

Resources:

  # ── Cognito ──────────────────────────────────────────────────────────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-pool'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub '${AWS::StackName}-ios'
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - jobsuite.leaf://signin
      LogoutURLs:
        - jobsuite.leaf://signout
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  # ── IAM ───────────────────────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # ── Lambda ────────────────────────────────────────────────────────────────────

  AppFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-app'
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: router.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Environment:
        Variables:
          GOOGLE_BOOKS_API_KEY: !Ref GoogleBooksApiKey

  # ── API Gateway ───────────────────────────────────────────────────────────────

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      EndpointConfiguration:
        Types:
          - REGIONAL

  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: '{proxy+}'

  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AppFunction.Arn}/invocations

  # ── Deployment & stage ────────────────────────────────────────────────────────

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ProxyMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: !Ref DeploymentNonce

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      TracingEnabled: true

  # ── Lambda invoke permission ──────────────────────────────────────────────────

  AppLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AppFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*

Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Description: Cognito User Pool ID for Amplify / iOS config.
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: Cognito app client ID.
  CognitoRegion:
    Value: !Ref AWS::Region
  CognitoHostedUIDomain:
    Value: !Sub '${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
  ApiBaseUrl:
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Description: Invoke URL for prod stage.
  StackName:
    Value: !Ref AWS::StackName
