# Deploy leaf-blower stack (CloudFormation). This workflow lives in the leaf-blower repo; paths are repo-relative.
#
# AWS auth (pick one):
# - IAM user (default): secrets AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY (e.g. user `github-user`).
# - OIDC: set repo variable AWS_AUTH_METHOD=oidc and secret AWS_ROLE_ARN (requires IAM trust for GitHub).
# See infra/README.md.

name: Deploy infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'infra/**'
      - '.github/workflows/deploy-infrastructure.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  STACK_NAME: leaf-blower-dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_AUTH_METHOD == 'oidc' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (IAM user)
        if: ${{ vars.AWS_AUTH_METHOD != 'oidc' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve artifact bucket
        run: |
          set -euo pipefail
          B="${{ secrets.ARTIFACT_BUCKET }}"
          if [ -z "$B" ]; then B="${{ vars.ARTIFACT_BUCKET }}"; fi
          if [ -z "$B" ]; then
            echo "::error::Set repository secret ARTIFACT_BUCKET or repository variable ARTIFACT_BUCKET to your S3 bucket name (create the bucket in AWS first; same region as the stack)."
            exit 1
          fi
          echo "BUCKET=$B" >> "$GITHUB_ENV"

      - name: Package Lambda (Python)
        run: |
          set -euo pipefail
          cd src
          zip -r "${GITHUB_WORKSPACE}/lambda.zip" .

      - name: Upload Lambda package to S3
        run: |
          set -euo pipefail
          KEY="leaf-blower/lambda-${GITHUB_SHA}.zip"
          aws s3 cp "${GITHUB_WORKSPACE}/lambda.zip" "s3://${BUCKET}/${KEY}"
          echo "LAMBDA_KEY=${KEY}" >> "${GITHUB_ENV}"

      - name: Deploy CloudFormation stack
        env:
          PREFIX: ${{ secrets.COGNITO_DOMAIN_PREFIX }}
        run: |
          set -euo pipefail
          test -n "${PREFIX:-}" || { echo "Set repository secret COGNITO_DOMAIN_PREFIX (globally unique per region)"; exit 1; }
          aws cloudformation deploy \
            --template-file infra/cloudformation/template.yaml \
            --stack-name "${STACK_NAME}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "CognitoDomainPrefix=${PREFIX}" \
              "LambdaCodeBucket=${BUCKET}" \
              "LambdaCodeKey=${LAMBDA_KEY}" \
              "DeploymentNonce=${GITHUB_SHA}" \
            --region "${AWS_REGION}"
